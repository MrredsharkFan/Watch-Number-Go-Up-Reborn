<!DOCTYPE html>
<head>
    <title>WNGU:R</title>
</head>
<style>
    .rc{
     align-items: center; 
     justify-content: center;
     display: flex   
    }
</style>
<html style="font-family: Arial; background-color: white;">
    <body>
        <div class="rc" style="position: fixed; width: 40%; height: 20%; right: 30%; top: 40%; background-color: #eee">
            <div style="background-color: #ccc; width: 70%; text-align: center;">
                <span id="points" style="font-size: 25px"></span> points<br>
                <span id="pps" style="font-size: 20px"></span>/s
            </div>
            <div style="position: absolute; top: 85%; height: 10%;background-color: #ccc; width: 50%; text-align: center;">
                <span id="fps" style="font-size: 100%"></span><br>
            </div>
        </div>
        <div class="rc" style="position: fixed; background-color: #ddd; width: 25%; height: 7%; left: 30%; top: 32%;">
            <div id="ubar" style="position: absolute; height: 100%; background-color: #aaa; width: 0%; z-index: -1; transition-duration: 0.1s;"></div>
            <button onclick="buy_upg()" style="background-color: #bbb; width: 50%">Boost speed<br>Cost: <span id="upg_cost"></span> points</button>
        </div>
        <div class="rc" style="position: fixed; background-color: #ddd; width: 14%; height: 3%; left: 56%; top: 32%;">
            x<span id="upg_effect"></span>
        </div>
        <div class="rc" style="position: fixed; background-color: #ddd; width: 14%; height: 3%; left: 56%; top: 36%;">
            <div id="ubar2" style="position: absolute; height: 100%; background-color: #aaa; width: 0%; z-index: -1; transition-duration: 0.1s;"></div>
            <span id="upg_boost_remain"></span>
        </div>
        <div class="rc" style="position: fixed; width: 40%; height: 6%; right: 30%; top: 25%; background-color: #eee">
            <div id="ubar3"
                style="position: absolute; height: 100%; background-color: #aaa; width: 0%; z-index: -1; transition-duration: 0.1s;">
            </div>
            <span style="position: absolute">Unlock buy max at 1.000e100 total points</span>
        </div>
        <div class="rc" style="position: fixed; width: 28%; height: 35%; left: 71%; top: 25%; background-color: #a46">
            <div id="reb_locked" style="visibility: hidden; position: fixed;">
                Reach 100000 points to unlock.
            </div>
            <div id="reb_div" class="rc" style="visibility: hidden">
                <span style="background-color: #f8a; position: absolute; top: 15%"><span style="font-size: 25px;" id="rp">16</span> rebirth points</span><br>
                <span style="background-color: #d68; position: absolute; top: 26%">x<span style="font-size: 20px;" id="rp_eff">16</span> points</span><br>
                <button style="position: absolute; top: 40%; height: 20%" onclick="rebirth()">Rebirth</button><br>
                <span style="background-color: #e79; position: absolute; top: 65%">+<span id="rp_gain">1000</span> rebirth points on reset</span>
                <span style="background-color: #d68; position: absolute; top: 75%">Rebirthing resets points and upgrades.</span>
            </div>
        </div>
        <div class="rc" style="position: fixed; width: 28%; height: 94%; left:1%; top: 3%; background-color: #af7e67">
            <div id="ru_locked" style="visibility: hidden; position: fixed;">
                Reach 1.000e30 points to unlock.
            </div>
            <div id="ru_div" style="visibility: hidden; position:  absolute; width: 100%; height: 100%">
                <div class="rc" style="background-color: #cf9e87; position: absolute; top: 3%; width: 90%; left: 5%; height: 4%; z-index: 5;">
                    <span id="money"></span>$&NonBreakingSpace;(<span id="mps"></span>/s)
                </div>
                <div class="rc" style="background-color: #cf9e87; position: absolute; top: 8%; width: 90%; left: 5%; height: 7%; z-index: 5;">
                    <button onclick="actual_roll()">Buy a rune!<br>Cost: $10</button>
                </div>
                <div class="rc" style="background-color: #cf9e87; position: absolute; top: 16%; width: 90%; left: 5%; height: 80%; z-index: 5;">
                    <div class="rc" style="top: 2%; height: 12%; width: 90%; left: 5%; position: absolute;z-index: 9; background-color: #dfae97;">
                        x<span id="rune_stats" style="font-size: 25px;"></span>&NonBreakingSpace;points
                    </div>
                    <div class="rc" id="runes" style="top: 15%; height: 80%; width: 90%; left: 5%; position: absolute;z-index: 9; background-color: #dfae97;"></div>
                </div>
            </div>
        </div>
    </body>
</html>
<script src="break_eternity.min.js"></script>
<script src="format.js"></script>
<script src="main.js"></script>
<script src="runes.js"></script>
<script src="save.js"></script>
